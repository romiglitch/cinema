    <text x="6" y="44" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="44" font-size="9" fill="#212529" font-family="monospace">HallId</text><text x="154" y="44" font-size="9" font-weight="700" fill="#0D6EFD" font-family="sans-serif">PK</text>
