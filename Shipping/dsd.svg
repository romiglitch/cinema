    <text x="100" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#212529" font-family="sans-serif">MovieGenres</text>
    <rect y="28" width="200" height="48" fill="#F8F9FA" stroke="#ADB5BD" stroke-width="1"/>
    <line x1="58" y1="28" x2="58" y2="76" stroke="#E9ECEF"/><line x1="148" y1="28" x2="148" y2="76" stroke="#E9ECEF"/>
    <text x="6" y="44" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="44" font-size="9" fill="#212529" font-family="monospace">IdMovie</text><text x="154" y="44" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">IdGenre</text><text x="154" y="64" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
  </g>

