    <text x="6" y="124" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="124" font-size="9" fill="#212529" font-family="monospace">Email</text><text x="154" y="124" font-size="8" font-weight="600" fill="#0D6EFD" font-family="sans-serif">UQ</text>
