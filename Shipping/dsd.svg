    <text x="6" y="44" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="44" font-size="9" fill="#212529" font-family="monospace">User</text><text x="164" y="44" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">Screening</text><text x="164" y="64" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
    <text x="6" y="84" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="84" font-size="9" fill="#212529" font-family="monospace">Row</text>
    <text x="6" y="104" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="104" font-size="9" fill="#212529" font-family="monospace">Seat</text>
    <text x="6" y="124" font-size="9" fill="#6C757D" font-family="sans-serif">decimal</text><text x="64" y="124" font-size="9" fill="#212529" font-family="monospace">Price</text>
    <text x="6" y="144" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="144" font-size="9" fill="#212529" font-family="monospace">Type</text>
  </g>
  <text x="385" y="540" text-anchor="middle" font-size="8" fill="#6C757D" font-family="sans-serif">seat key: User + Screening + Row + Seat</text>

  <!-- TicketsPricing -->
  <g transform="translate(1080, 528)">
    <rect width="220" height="28" fill="#DEE2E6" stroke="#ADB5BD" stroke-width="1"/>
    <text x="110" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#212529" font-family="sans-serif">TicketsPricing</text>
    <rect y="28" width="220" height="68" fill="#F8F9FA" stroke="#ADB5BD" stroke-width="1"/>
