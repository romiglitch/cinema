    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">Title</text>
    <text x="6" y="84" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="84" font-size="9" fill="#212529" font-family="monospace">Description</text>
    <text x="6" y="104" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="104" font-size="9" fill="#212529" font-family="monospace">Duration</text>
    <text x="6" y="124" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="124" font-size="9" fill="#212529" font-family="monospace">Age</text>
