    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">MovieId</text><text x="184" y="64" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
    <text x="6" y="84" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="84" font-size="9" fill="#212529" font-family="monospace">Hall</text><text x="184" y="84" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
    <text x="6" y="104" font-size="9" fill="#6C757D" font-family="sans-serif">datetime</text><text x="64" y="104" font-size="9" fill="#212529" font-family="monospace">StartTime</text>
    <text x="6" y="124" font-size="9" fill="#6C757D" font-family="sans-serif">datetime</text><text x="64" y="124" font-size="9" fill="#212529" font-family="monospace">EndTime</text>
    <text x="6" y="144" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="144" font-size="9" fill="#212529" font-family="monospace">SeatesBought</text>
