    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">HallId</text><text x="174" y="64" font-size="9" font-weight="600" fill="#6C757D" font-family="sans-serif">FK</text>
    <text x="6" y="84" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="84" font-size="9" fill="#212529" font-family="monospace">RowNumber</text>
    <text x="6" y="104" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="104" font-size="9" fill="#212529" font-family="monospace">SeatNumber</text>
