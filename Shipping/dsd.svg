  <text x="40" y="940" font-size="9" fill="#6C757D" font-family="sans-serif">Login: Users.Email (unique index UX_Users_Email) | HomePage imports TMDb genres into MovieGenres; MovieDetails joins Genres.Name</text>
  <text x="40" y="956" font-size="9" fill="#6C757D" font-family="sans-serif">ScreeningsEditor inserts without SeatesBought; AdminPage/Cart update SeatesBought on booking</text>
  <text x="40" y="972" font-size="9" fill="#6C757D" font-family="sans-serif">Scripts: CreateCreditCards.sql, NormalizeUserEmails.sql</text>
