    <text x="87.5" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#212529" font-family="sans-serif">Genres</text>
    <rect y="28" width="175" height="48" fill="#F8F9FA" stroke="#ADB5BD" stroke-width="1"/>
    <line x1="58" y1="28" x2="58" y2="76" stroke="#E9ECEF"/><line x1="128" y1="28" x2="128" y2="76" stroke="#E9ECEF"/>
    <text x="6" y="44" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="44" font-size="9" fill="#212529" font-family="monospace">Id</text><text x="134" y="44" font-size="9" font-weight="700" fill="#0D6EFD" font-family="sans-serif">PK</text>
    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">Name</text>
  </g>

