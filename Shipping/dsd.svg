    <text x="6" y="164" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="164" font-size="9" fill="#212529" font-family="monospace">ResetToken</text>
    <text x="6" y="184" font-size="9" fill="#6C757D" font-family="sans-serif">datetime</text><text x="64" y="184" font-size="9" fill="#212529" font-family="monospace">TokenExpiry</text>
