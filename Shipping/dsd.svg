<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="980" viewBox="0 0 1420 980">
  <title>DSD - Shipping Cinema (Dtb)</title>
  <rect width="1420" height="980" fill="#FFFFFF"/>

  <defs>
    <marker id="crow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L10,6 L0,12 M0,0 L5,6 M0,12 L5,6" fill="none" stroke="#495057" stroke-width="1.2"/>
    </marker>
    <g id="one-end">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#495057" stroke-width="1.5"/>
      <line x1="4" y1="-5" x2="4" y2="5" stroke="#495057" stroke-width="1.5"/>
    </g>
  </defs>

  <text x="1380" y="42" text-anchor="end" font-size="22" font-weight="700" fill="#0D6EFD" font-family="sans-serif">&#x5EA;&#x5E8;&#x5E9;&#x5D9;&#x5DD; DSD</text>
  <text x="40" y="62" font-size="10" fill="#6C757D" font-family="sans-serif">Shipping / Dtb.mdf &#x2014; schema from application SQL (10 tables)</text>

  <!-- Relationships (under tables) -->
  <g id="rels" fill="none" stroke="#495057" stroke-width="1.2">
    <!-- Genres 1:N MovieGenres -->
    <polyline points="495,108 530,108" marker-end="url(#crow)"/><use href="#one-end" transform="translate(495,108)"/>
    <!-- Movie 1:N MovieGenres -->
    <polyline points="780,108 730,108" marker-end="url(#crow)"/><use href="#one-end" transform="translate(780,108)"/>
    <!-- Movie 1:N Screening -->
    <polyline points="890,264 890,272 595,272 595,280" marker-end="url(#crow)"/><use href="#one-end" transform="translate(890,264)"/>
    <!-- Halls 1:N Screening (route right of Halls, not across Movie row) -->
    <polyline points="1080,128 1320,128 1320,368 710,368" marker-end="url(#crow)"/><use href="#one-end" transform="translate(1080,128)"/>
    <!-- Halls 1:N Seats -->
    <polyline points="1180,186 1180,248" marker-end="url(#crow)"/><use href="#one-end" transform="translate(1180,186)"/>
    <!-- Users 1:N Tickets -->
    <polyline points="140,468 140,512 280,512 280,548" marker-end="url(#crow)"/><use href="#one-end" transform="translate(140,468)"/>
    <!-- Screening 1:N Tickets -->
    <polyline points="595,436 595,512 490,512 490,548" marker-end="url(#crow)"/><use href="#one-end" transform="translate(595,436)"/>
  </g>
  <polyline points="490,716 820,716 820,568 1080,568" fill="none" stroke="#ADB5BD" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="820" y="708" text-anchor="middle" font-size="8" fill="#6C757D" font-family="sans-serif">Tickets.Type &#x2192; TicketsPricing.PersonType</text>

  <!-- CreditCards (no FK) -->
  <g transform="translate(40, 88)">
    <rect width="248" height="28" fill="#FFF8E6" stroke="#856404" stroke-width="1"/>
    <text x="124" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#212529" font-family="sans-serif">CreditCards</text>
    <rect y="28" width="248" height="108" fill="#FFFBF0" stroke="#856404" stroke-width="1"/>
    <line x1="58" y1="28" x2="58" y2="136" stroke="#E9ECEF"/><line x1="188" y1="28" x2="188" y2="136" stroke="#E9ECEF"/>
    <text x="6" y="44" font-size="9" fill="#6C757D" font-family="sans-serif">int</text><text x="64" y="44" font-size="9" fill="#212529" font-family="monospace">Id</text><text x="194" y="44" font-size="9" font-weight="700" fill="#0D6EFD" font-family="sans-serif">PK</text>
    <text x="6" y="64" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="64" font-size="9" fill="#212529" font-family="monospace">HolderName</text>
    <text x="6" y="84" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="84" font-size="9" fill="#212529" font-family="monospace">CardNumber</text>
    <text x="6" y="104" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="104" font-size="9" fill="#212529" font-family="monospace">ExpirationDate</text>
    <text x="6" y="124" font-size="9" fill="#6C757D" font-family="sans-serif">nvarchar</text><text x="64" y="124" font-size="9" fill="#212529" font-family="monospace">CVC</text>
  </g>
  <text x="164" y="218" text-anchor="middle" font-size="8" fill="#856404" font-family="sans-serif">BankService (no FK)</text>

