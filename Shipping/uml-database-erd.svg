<text x="30" y="36" font-size="14" font-weight="600" fill="#E4E4E4" font-family="sans-serif">Database Schema (ERD) — Shipping Cinema System</text>
<text x="30" y="54" font-size="10" fill="#5E5E5E" font-family="sans-serif">SQL Server LocalDB · 8 tables · inferred from application SQL queries</text>

<!-- Movie -->
<text x="172.5" y="83" text-anchor="middle" font-size="10" fill="#5E5E5E" font-style="italic" font-family="sans-serif">«table»</text>
<rect x="30" y="88" width="285" height="32" fill="#2A2A2A"/>
