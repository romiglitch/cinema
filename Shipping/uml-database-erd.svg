<line x1="30" y1="120" x2="315" y2="120" stroke="#333333" stroke-width="1"/>
<text x="38" y="142" font-size="11" font-family="monospace"><tspan fill="#599CE7" font-size="9" font-weight="700">PK </tspan><tspan fill="#A0A0A0">Id: </tspan><tspan fill="#A0A0A0" font-style="italic">int IDENTITY</tspan></text>
<text x="38" y="161" font-size="11" font-family="monospace"><tspan fill="#5E5E5E">+ </tspan><tspan fill="#A0A0A0">Title: </tspan><tspan fill="#A0A0A0" font-style="italic">nvarchar</tspan></text>
<text x="38" y="180" font-size="11" font-family="monospace"><tspan fill="#5E5E5E">+ </tspan><tspan fill="#A0A0A0">Description: </tspan><tspan fill="#A0A0A0" font-style="italic">nvarchar</tspan></text>
<text x="38" y="199" font-size="11" font-family="monospace"><tspan fill="#5E5E5E">+ </tspan><tspan fill="#A0A0A0">Duration: </tspan><tspan fill="#A0A0A0" font-style="italic">int</tspan></text>
<text x="38" y="218" font-size="11" font-family="monospace"><tspan fill="#5E5E5E">+ </tspan><tspan fill="#A0A0A0">Age: </tspan><tspan fill="#A0A0A0" font-style="italic">int</tspan></text>
<text x="38" y="237" font-size="11" font-family="monospace"><tspan fill="#5E5E5E">+ </tspan><tspan fill="#A0A0A0">Poster: </tspan><tspan fill="#A0A0A0" font-style="italic">nvarchar</tspan></text>
<text x="38" y="256" font-size="11" font-family="monospace"><tspan fill="#5E5E5E">+ </tspan><tspan fill="#A0A0A0">TmdbId: </tspan><tspan fill="#A0A0A0" font-style="italic">int</tspan></text>
<rect x="30" y="70" width="285" height="198" fill="none" stroke="#484848" stroke-width="1.5" rx="2"/>

