  <title>Database Schema ERD — Shipping Cinema System</title>
  <rect width="985" height="950" fill="#FFFFFF"/>
<text x="30" y="36" font-size="14" font-weight="600" fill="#212529" font-family="sans-serif">Database Schema (ERD) — Shipping Cinema System</text>
<text x="30" y="54" font-size="10" fill="#6C757D" font-family="sans-serif">SQL Server LocalDB · 9 tables · inferred from application SQL queries</text>

<!-- Movie -->
<text x="172.5" y="83" text-anchor="middle" font-size="10" fill="#6C757D" font-style="italic" font-family="sans-serif">«table»</text>
<rect x="30" y="88" width="285" height="32" fill="#E9ECEF"/>
<text x="172.5" y="109" text-anchor="middle" font-size="12" font-weight="600" fill="#212529" font-family="monospace">Movie</text>
<line x1="30" y1="120" x2="315" y2="120" stroke="#CED4DA" stroke-width="1"/>
<text x="38" y="142" font-size="11" font-family="monospace"><tspan fill="#0D6EFD" font-size="9" font-weight="700">PK </tspan><tspan fill="#495057">Id: </tspan><tspan fill="#495057" font-style="italic">int IDENTITY</tspan></text>
<text x="38" y="161" font-size="11" font-family="monospace"><tspan fill="#6C757D">+ </tspan><tspan fill="#495057">Title: </tspan><tspan fill="#495057" font-style="italic">nvarchar</tspan></text>
<text x="38" y="180" font-size="11" font-family="monospace"><tspan fill="#6C757D">+ </tspan><tspan fill="#495057">Description: </tspan><tspan fill="#495057" font-style="italic">nvarchar</tspan></text>
<text x="38" y="199" font-size="11" font-family="monospace"><tspan fill="#6C757D">+ </tspan><tspan fill="#495057">Duration: </tspan><tspan fill="#495057" font-style="italic">int</tspan></text>
<text x="38" y="218" font-size="11" font-family="monospace"><tspan fill="#6C757D">+ </tspan><tspan fill="#495057">Age: </tspan><tspan fill="#495057" font-style="italic">int</tspan></text>
<text x="38" y="237" font-size="11" font-family="monospace"><tspan fill="#6C757D">+ </tspan><tspan fill="#495057">Poster: </tspan><tspan fill="#495057" font-style="italic">nvarchar</tspan></text>
<text x="38" y="256" font-size="11" font-family="monospace"><tspan fill="#6C757D">+ </tspan><tspan fill="#495057">TmdbId: </tspan><tspan fill="#495057" font-style="italic">int</tspan></text>
<rect x="30" y="70" width="285" height="198" fill="none" stroke="#ADB5BD" stroke-width="1.5" rx="2"/>

<!-- MovieGenres -->
