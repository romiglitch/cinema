<text x="30" y="900" font-size="9" fill="#6C757D" font-family="sans-serif"><tspan fill="#0D6EFD" font-weight="700">PK</tspan> = primary key    <tspan fill="#6C757D" font-weight="600">FK</tspan> = foreign key    <tspan fill="#6C757D" font-weight="600">UQ</tspan> = unique (filtered index UX_Users_Email on Email WHERE Email IS NOT NULL)    N/1 = cardinality</text>
<text x="30" y="915" font-size="9" fill="#6C757D" font-family="sans-serif">Users.Email = login identity · ResetToken/TokenExpiry = forgot-password flow · CreditCards = payment sandbox (BankService; no FK) · ExpirationDate stored as MM/YYYY</text>
<text x="30" y="930" font-size="9" fill="#6C757D" font-family="sans-serif">MovieGenres.IdGenre = external TMDb IDs (no local Genre table) · Tickets.Type references TicketsPricing.PersonType</text>
